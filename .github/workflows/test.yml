name: API tests (Playwright)

on:
  push:
  pull_request:

concurrency:
  group: api-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api-tests/package-lock.json

      - name: Install npm dependencies
        working-directory: api-tests
        run: npm ci

      - name: Install Playwright runtime
        working-directory: api-tests
        run: npx playwright install

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for API health checks
        working-directory: api-tests
        run: npm run wait:services

      - name: Run Playwright API tests
        working-directory: api-tests
        env:
          CI: 'true'
          AUTH_BASE_URL: http://127.0.0.1:9000
          AIRLINES_BASE_URL: http://127.0.0.1:9001
          CRUISES_BASE_URL: http://127.0.0.1:9002
        run: npx playwright test

      - name: Add summary link (HTML report artifact)
        if: always()
        run: |
          echo "## Playwright API results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the **playwright-api-report** artifact for the interactive HTML dashboard (open \`index.html\`)." >> "$GITHUB_STEP_SUMMARY"
          echo "The job log above includes the pass/fail line summary from the \`list\` reporter." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: api-tests/playwright-report
          retention-days: 14

      - name: Upload test results (traces etc.)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: api-tests/test-results
          retention-days: 7
